services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: website-api
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./database.sqlite:/app/database.sqlite
    environment:
      - NODE_ENV=production
    networks:
      - website-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: website-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - website-network

networks:
  website-network:
    driver: bridge
